<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Calculator</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="./index.css" />
		<script src="./index.js" defer></script>
	</head>
	<body>
		<div class="calculator-container">
			<main class="calculator">
				<section class="display">
					<div class="display__previous">10</div>
					<div class="display__operation">
						<span class="display__equal">=</span>
						<div class="display__current">
							<span class="display__first">2</span>
							<span class="display__operator">+</span> <span class="display__second">3</span>
						</div>
					</div>
				</section>
				<section class="buttons">BUTTONS</section>
			</main>
		</div>
	</body>
</html>
